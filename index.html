<!-- =========================
  ONE レジアプリ（無料版）完全フル：PART1-1 修正版
  役割：HTML骨格 / CSS前半
  保存KEY：ONE_FREE_FULL_V3
  ※重要：このPARTでは </body></html> を閉じない
  ※重要：このPARTではまだ </style> を閉じない
========================= -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#174b2f" />
  <title>ONE FREE</title>

  <style>
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x:hidden;
      background: var(--pageBg);
      color: var(--ink);
      touch-action: pan-y;
      overscroll-behavior-y: contain;
      -webkit-text-size-adjust:100%;
    }
    button,input,select,textarea{ font:inherit; }
    button{ touch-action: manipulation; }
    a{ color: inherit; }

    body.modalLock{
      position:fixed;
      width:100%;
      overflow:hidden;
    }

    input, textarea, select{
      font-size:16px;
      -webkit-appearance:none;
      appearance:none;
      color:var(--ink);
    }

    :root{
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);

      --ink:#173a27;
      --ink2:#1b4a31;
      --white:#ffffff;

      --pageBg:#eaf4df;
      --cardBg:#dff0c9;
      --reserveBg:#eaf4ff;
      --emptyBg:#ffffff;

      --darkGreen:#174b2f;
      --mossGreen:#3aa55b;
      --limeLine:#d9ff9a;
      --topLine:#77d86b;

      /* 下段外側の帯を茶色 */
      --tanBg:#b69072;
      --tanFill:#e2d3bf;
      --tanLineLight:#f2eadf;
      --tanLineDark:#6b4b2c;
      --tanInk:#2f2217;

      --pinkBg:#f7cfe0;
      --pinkBd:#bb5f88;

      --yellowBg:#fff1a8;
      --yellowBd:#b38b00;

      --purpleBg:#ddd3ff;
      --purpleBd:#6d58c8;

      --blueBg:#cfe8ff;
      --blueBd:#4e83c8;

      --orangeBg:#ffd9b5;
      --orangeBd:#c67627;

      --groupText:#1b1b1b;

      --gap:8px;
      --topH:56px;

      /* 少し詰める */
      --bottomH:72px;

      --radiusTop:16px;
      --radiusCard:16px;
    }

    .app{
      min-height:100dvh;
      padding-left: calc(10px + var(--sal));
      padding-right: calc(10px + var(--sar));
      padding-top: calc(var(--topH) + var(--sat));
      padding-bottom: calc(var(--bottomH) + var(--sab));
    }

    .screen{
      display:none;
      padding:14px;
      max-width:980px;
      margin:0 auto;
    }
    .screen.active{ display:block; }

    /* =========================
      Header
    ========================= */
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      z-index:50;
      height: calc(var(--topH) + var(--sat));
      padding-top: var(--sat);
      padding-left: calc(10px + var(--sal));
      padding-right: calc(10px + var(--sar));
      background: linear-gradient(90deg, #1a5636 0%, #14452b 50%, #1a5636 100%);
    }
    .topbar::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:0;
      height:2px;
      background: var(--topLine);
      opacity:.95;
    }
    .topbarInner{
      height: var(--topH);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .brandWrap{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:150px;
    }
    .brandBox{
      height:36px;
      width:92px;
      border-radius:12px;
      border:2px solid var(--limeLine);
      background: var(--darkGreen);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:900;
      font-size:14px;
      letter-spacing:.5px;
      line-height:1;
      user-select:none;
      -webkit-user-select:none;
    }
    .brandBox .dot{ margin-right:6px; color:#58ff7a; }

    .antennaWrap{
      position:relative;
      width:34px;
      height:34px;
      border-radius:10px;
      background: var(--mossGreen);
      border:none;
      display:grid;
      place-items:center;
      padding:0;
      margin:0;
    }
    .antennaIcon{ display:none; }
    .antennaSvg{ width:22px; height:22px; display:block; }
    .antennaSvg path{ fill:#fff; }
    .antennaX{
      position:absolute;
      top:3px; right:3px;
      font-size:14px;
      line-height:1;
      color:#c33b2e;
      font-weight:900;
      display:none;
      text-shadow:0 1px 0 rgba(255,255,255,0.25);
    }
    .antennaWrap.off .antennaX{ display:block; }

    .topCenter{
      flex:1;
      display:flex;
      justify-content:center;
    }
    .topRight{
      min-width:96px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
    }

    .topBtn{
      height:30px;
      min-width:84px;
      border-radius:16px;
      border:2px solid var(--limeLine);
      background: var(--darkGreen);
      color:#fff;
      font-weight:400;
      font-size:15px;
      padding:2px 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
      user-select:none;
      -webkit-user-select:none;
    }
    .topBtn.wKitchen{ min-width:96px; }

    /* =========================
      Main
    ========================= */
    .hintText{
      font-weight:800;
      color: var(--ink2);
      font-size:16px;
      line-height:1.2;
      user-select:none;
      -webkit-user-select:none;
      margin:6px 0 10px 0;
    }

    .seatGrid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap: var(--gap);
      align-items:stretch;
    }

    .seatCard{
      position:relative;
      background: var(--cardBg);
      border-radius: var(--radiusCard);
      border:2px solid var(--darkGreen);
      box-shadow: inset 0 0 0 1px #ffffff;
      min-height:150px;
      padding:8px 8px 10px;
      color: var(--ink);
      overflow:hidden;
      user-select:none;
      -webkit-user-select:none;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .seatCard.reserve{ background: var(--reserveBg); }
    .seatCard.empty{ background: var(--emptyBg); }
    .seatCard.in{ background: var(--cardBg); }

    .seatCard.group-pink{
      background: var(--pinkBg) !important;
      border-color: var(--pinkBd);
      color: var(--groupText);
    }
    .seatCard.group-yellow{
      background: var(--yellowBg) !important;
      border-color: var(--yellowBd);
      color: var(--groupText);
    }
    .seatCard.group-purple{
      background: var(--purpleBg) !important;
      border-color: var(--purpleBd);
      color: var(--groupText);
    }
    .seatCard.group-blue{
      background: var(--blueBg) !important;
      border-color: var(--blueBd);
      color: var(--groupText);
    }
    .seatCard.group-orange{
      background: var(--orangeBg) !important;
      border-color: var(--orangeBd);
      color: var(--groupText);
    }

    /* 選択時は赤枠 */
    .seatCard.isSelected{
      border:3px solid #d22;
      box-shadow:
        inset 0 0 0 1px #ffffff,
        0 0 0 2px rgba(210,34,34,.18);
    }

.seatNo{
  font-size:20px;
  font-weight:900;
  line-height:1.06;
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  min-height:42px;
  margin-top:24px;
  margin-bottom:4px;
  padding-right:0;
  width:100%;
}

.seatPeople{
  position:absolute;
  left:8px;
  top:6px;
  right:52px; /* Gタグぶんだけ空ける */
  font-size:15px;
  font-weight:900;
  line-height:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.seatName{
  font-size:15px;
  font-weight:900;
  line-height:1.1;
  min-height:17px;
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.seatState{
  font-size:15px;
  font-weight:900;
  line-height:1.1;
  min-height:17px;
  margin-bottom:3px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.seatSub{
  display:none; /* グループ表示は消す */
}

.seatBills{
  font-size:13px;
  font-weight:800;
  line-height:1.05;
  opacity:.78;
  min-height:15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.seatPrice{
  display:none; /* 料金は載せない */
}

.groupTag{
  position:absolute;
  right:8px;
  top:6px;
  min-width:34px;
  height:24px;
  padding:0 8px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  background:rgba(255,255,255,0.82);
  color:#222;
  border:1px solid rgba(0,0,0,0.12);
}

    /* =========================
      Bottom Nav
    ========================= */
    .bottomBar{
      position:fixed;
      left:0; right:0; bottom:0;
      z-index:45;
      height: calc(var(--bottomH) + var(--sab));
      padding-bottom: var(--sab);
      padding-left: calc(10px + var(--sal));
      padding-right: calc(10px + var(--sar));
      background: var(--tanBg);
      display:flex;
      align-items:center;
    }
    .bottomInner{
      width:100%;
      max-width:980px;
      margin:0 auto;
      height: var(--bottomH);
      display:flex;
      align-items:center;
    }

    .navGroup{
      width:100%;
      display:flex;
      gap:0;
      border-radius:14px;
      overflow:hidden;
      border:2px solid var(--tanLineLight);
      box-shadow: inset 0 0 0 1px var(--tanLineDark);
      background: var(--tanFill);
    }
    .navSep{
      width:4px;
      background:
        linear-gradient(90deg,
          var(--tanLineLight) 0 1px,
          var(--tanLineDark) 1px 3px,
          var(--tanLineLight) 3px 4px
        );
      flex:0 0 4px;
    }
    .navBtn{
      flex:1;
      height:58px;
      background: var(--tanFill);
      color: var(--tanInk);
      border:none;
      padding:2px 4px;
      font-weight:900;
      font-size:15px;
      line-height:1.05;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      user-select:none;
      -webkit-user-select:none;
      white-space:normal;
    }
    .navBtn.on{ background: var(--tanFill); color: var(--tanInk); }

    .arriveBtnText{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
      line-height:1;
    }
    .arriveBtnLine{
      width:30px;
      height:2px;
      background: var(--tanLineDark);
      opacity:.6;
      border-radius:2px;
    }

    /* =========================
      Generic UI
    ========================= */
    .btn{
      border-radius:18px;
      border:2px solid rgba(217,255,154,.85);
      background: rgba(23,75,47,.85);
      color:#fff;
      padding:10px 12px;
      font-weight:700;
      font-size:16px;
      min-height:44px;
      line-height:1.1;
    }
    .btn.full{ width:100%; }
    .btn.lime{
      background: rgba(23,75,47,.92);
      border-color: rgba(217,255,154,.9);
      color:#fff;
      font-weight:700;
    }
    .btn.ghost{
      background: transparent;
      border-color: transparent;
      color: var(--ink);
      padding:8px 10px;
      min-height:40px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.58);
      border:1px solid rgba(0,0,0,.08);
      color:var(--ink);
      font-weight:800;
    }

    .panel{
      border-radius:18px;
      padding:12px;
      background:rgba(255,255,255,.42);
      border:1px solid rgba(0,0,0,.08);
      color:var(--ink);
    }

    .muted{ opacity:.78; }

    /* =========================
      共通スライドUI
    ========================= */
    .range,
    .kRange{
      -webkit-appearance:none;
      appearance:none;
      width:82%;
      max-width:420px;
      min-width:180px;
      height:52px;
      background:rgba(255,255,255,.58);
      border:1px solid rgba(0,0,0,.10);
      border-radius:999px;
      outline:none;
      padding:0 6px;
    }

    .range::-webkit-slider-thumb,
    .kRange::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:46px;
      height:46px;
      border-radius:50%;
      background:var(--darkGreen);
      border:none;
      box-shadow:0 2px 6px rgba(0,0,0,.22);
      cursor:pointer;
    }

    .range::-moz-range-thumb,
    .kRange::-moz-range-thumb{
      width:46px;
      height:46px;
      border-radius:50%;
      background:var(--darkGreen);
      border:none;
      box-shadow:0 2px 6px rgba(0,0,0,.22);
      cursor:pointer;
    }

    .range::-moz-range-track,
    .kRange::-moz-range-track{
      height:52px;
      background:rgba(255,255,255,.58);
      border:1px solid rgba(0,0,0,.10);
      border-radius:999px;
    }

    .backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.42);
      z-index:80;
      display:none;
      align-items:center;
      justify-content:center;
      padding:12px;
      padding-top:calc(12px + var(--sat));
      padding-bottom:calc(12px + var(--sab));
    }
    .backdrop.show{ display:flex; }

    .modal{
      width:min(560px, 100%);
      background:#e6f2de;
      border-radius:18px;
      border:2px solid rgba(23,75,47,.35);
      overflow:hidden;
      max-height:calc(100vh - 24px - var(--sat) - var(--sab));
      display:flex;
      flex-direction:column;
    }
    .modalHead{
      padding:14px 14px 12px;
      border-bottom:2px solid rgba(0,0,0,0.08);
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
      background:#ecf6e6;
    }
    .modalTitleL{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .modalSeatId{
      font-weight:900;
      font-size:18px;
      white-space:nowrap;
      color:var(--darkGreen);
    }
    .modalTitleText{
      font-size:18px;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .modalBody{
      padding:14px;
      color:var(--ink);
      font-size:16px;
      font-weight:700;
      line-height:1.65;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      flex:1 1 auto;
      min-height:0;
      background:#e6f2de;
    }
    .modalActions{
      padding:12px 14px 14px;
      display:flex;
      gap:12px;
      justify-content:flex-end;
      flex-wrap:wrap;
      flex:0 0 auto;
      background:#ecf6e6;
    }
    .bigBtn{
      min-height:52px;
      padding:12px 14px;
      font-weight:900;
      border-radius:18px;
      font-size:16px;
    }

    .toast{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(var(--bottomH) + 18px + var(--sab));
      background: rgba(0,0,0,0.78);
      color:#fff;
      padding:10px 12px;
      border-radius:14px;
      font-weight:800;
      font-size:14px;
      z-index:90;
      display:none;
      max-width:min(90vw, 860px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .toast.show{ display:block; }

    @media (max-width: 390px){
      .hintText{ font-size:15px; }
      .seatNo{ font-size:20px; }
      .seatPeople{ font-size:14px; }
      .seatName{ font-size:14px; }
      .seatState{ font-size:14px; }
      .navBtn{ font-size:13px; }
      .topBtn{ font-size:14px; }
    }
  </style>
</head>

<body>
  <header class="topbar" id="topbar">
    <div class="topbarInner">
      <div class="brandWrap">
        <div class="brandBox"><span class="dot">🟢</span>ONE</div>

        <button class="antennaWrap" id="btnAntenna" aria-label="同期状態">
          <svg class="antennaSvg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 20h2v-2H3v2zm4 0h2v-4H7v4zm4 0h2v-6h-2v6zm4 0h2v-8h-2v8zm4 0h2V4h-2v16z"/>
          </svg>
          <span class="antennaX">❌</span>
          <span class="antennaIcon">📶</span>
        </button>
      </div>

      <div class="topCenter">
        <button class="topBtn wKitchen" id="navSecond">キッチン</button>
      </div>

      <div class="topRight">
        <button class="topBtn" id="btnSave">保存</button>
      </div>
    </div>
  </header>

  <main class="app">
    <section class="screen active" id="scrMain">
      <div class="hintText" id="mainHint">空席は複数選択できます</div>
      <div class="seatGrid" id="seatGrid"></div>
    </section>

    <section class="screen" id="scrKitchen"><div class="pageDesc">（PART3で実装）</div></section>
    <section class="screen" id="scrSales"><div class="pageDesc">（PART4で実装）</div></section>
    <section class="screen" id="scrFix"><div class="pageDesc">（PART5で実装）</div></section>
    <section class="screen" id="scrSeatSetup"><div class="pageDesc">（PART6で実装）</div></section>
    <section class="screen" id="scrSettings"><div class="pageDesc">（後で単独修正）</div></section>
    <section class="screen" id="scrMenu"><div class="pageDesc">（PART8で実装）</div></section>
    <section class="screen" id="scrOrder"><div class="pageDesc">（PART2で実装）</div></section>
    <section class="screen" id="scrCheckout"><div class="pageDesc">（PART2で実装）</div></section>
  </main>

  <div class="bottomBar" id="bottomBar">
    <div class="bottomInner">
      <div class="navGroup">
        <button class="navBtn" id="goArriveReserve">
          <span class="arriveBtnText">
            <span>来店</span>
            <span class="arriveBtnLine"></span>
            <span>予約</span>
          </span>
        </button>
        <div class="navSep"></div>
        <button class="navBtn" id="goMove">席移動</button>
        <div class="navSep"></div>
        <button class="navBtn" id="goTodaySales">本日の<br>売上</button>
        <div class="navSep"></div>
        <button class="navBtn" id="goSettings">設定</button>
      </div>
    </div>
  </div>

  <div class="backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalHead">
        <div class="modalTitleL">
          <div class="modalSeatId" id="modalSeatId" style="display:none"></div>
          <div class="modalTitleText" id="modalTitle"></div>
        </div>
        <button class="btn ghost" id="modalClose">閉じる</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
      <div class="modalActions" id="modalActions"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* =========================
      Common / State (PART1)
    ========================= */
    const KEY = "ONE_FREE_FULL_V3";
    const $ = (id)=> document.getElementById(id);

    function nowTs(){ return Date.now(); }
    function pad2(n){ return String(n).padStart(2,"0"); }
    function yen(n){
      const x = Number(n||0);
      return "¥" + x.toLocaleString("ja-JP");
    }

    function toast(msg, ms=1800){
      const t = $("toast");
      if(!t) return;
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toast._tm);
      toast._tm = setTimeout(()=> t.classList.remove("show"), ms);
    }

    function lockBody(){
      const y = window.scrollY;
      document.body.dataset.scrollY = String(y);
      document.body.classList.add("modalLock");
      document.body.style.top = `-${y}px`;
    }
    function unlockBody(){
      const y = Number(document.body.dataset.scrollY || "0");
      document.body.classList.remove("modalLock");
      document.body.style.top = "";
      window.scrollTo(0, y);
    }

    function openModal(title, bodyHtml, actions, seatId=null){
      $("modalTitle").textContent = title || "";
      $("modalBody").innerHTML = bodyHtml || "";

      if(seatId){
        $("modalSeatId").style.display = "block";
        $("modalSeatId").textContent = seatId;
      }else{
        $("modalSeatId").style.display = "none";
        $("modalSeatId").textContent = "";
      }

      const box = $("modalActions");
      box.innerHTML = "";
      (actions||[]).forEach(a=>{
        const b = document.createElement("button");
        b.className = "btn bigBtn" + (a.lime ? " lime" : "");
        b.textContent = a.label;
        b.onclick = ()=> a.onClick && a.onClick();
        box.appendChild(b);
      });

      $("modalBackdrop").classList.add("show");
      lockBody();
    }
    function closeModal(){
      $("modalBackdrop").classList.remove("show");
      unlockBody();
    }

    $("modalClose").onclick = ()=> closeModal();

    if(

        t.closest("#modalBackdrop,.modal,.modalCard,.sheet,.dialog,.overlay,.modalMask,[role='dialog']")

function upsertOrderAgg(bucket, item, delta){
  bucket.orders = bucket.orders || [];
  let o = bucket.orders.find(x=> x.itemId===item.id);
  const d = Number(delta||0);

  if(!o){
    if(d <= 0) return;
    bucket.orders.push({
      itemId:item.id,
      name:item.name,
      price:item.price,
      tax:item.tax,
      qty:d,
      cat:item.cat,
      genre:item.genre
    });
    return;
  }

  o.qty = Number(o.qty||0) + d;
  if(o.qty <= 0){
    bucket.orders = bucket.orders.filter(x=> x.itemId!==item.id);
  }
}

function pushOrderLog(bucket, item, delta, reason){
  bucket.orderLog = bucket.orderLog || [];
  bucket.orderLog.unshift({
    id: "ol_" + Math.random().toString(36).slice(2),
    ts: nowTs(),
    itemId: item.id,
    name: item.name,
    delta: Number(delta||0),
    reason: reason || "",
  });
}

function formatHM(ts){
  const d = new Date(ts);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function renderOrder_v4(){
  const seat = getOrderTargetSeat();
  if(!seat){
    showScreen("scrMain");
    return;

  if(orderSeatLabel){
    orderSeatLabel.textContent = getSeatDisplayLabel(seat);
  }

  $("orderGoPay").onclick = ()=> openCheckout_v4();

    state.order.cat = null;
    state.order.genre = null;
    showScreen("scrMain");
  };

  const foodBtn = $("orderCatFood");
  const drinkBtn = $("orderCatDrink");

  foodBtn.onclick = ()=> toggleCat("food");
  drinkBtn.onclick = ()=> toggleCat("drink");

  function toggleCat(cat){
    if(state.order.cat === cat){
      state.order.cat = null;
      state.order.genre = null;
      renderOrder_v4();
      return;
    }
    state.order.cat = cat;
    state.order.genre = null;
    renderOrder_v4();
  }

  setBtnHL(foodBtn, state.order.cat==="food");
  setBtnHL(drinkBtn, state.order.cat==="drink");

  const gw = $("orderGenreWrap");
  const gg = $("orderGenreGrid");
  const iw = $("orderItemsWrap");
  const ig = $("orderItemsGrid");

  gg.innerHTML = "";

  if(!state.order.cat){
    gw.style.display = "none";
    iw.style.display = "none";
  }else{
    const genres = listGenresByCat(state.order.cat);
    gw.style.display = "block";
    iw.style.display = "none";

      gg.innerHTML = `<div class="panel muted">ジャンルがありません。先にメニュー登録をしてください。</div>`;

      genres.forEach(g=>{

        b.style.minHeight = "66px";
        b.style.display = "flex";
        b.style.alignItems = "center";
        b.style.justifyContent = "center";
        b.style.fontWeight = "1000";
        b.style.fontSize = "18px";
        b.textContent = g;
        b.onclick = ()=>{
          state.order.genre = g;
          renderOrder_v4();
        };
        gg.appendChild(b);
      });
    }
  }

  if(state.order.cat && state.order.genre){

        `;
        c.onclick = ()=> openOrderDeltaModal_v4(seat, it);
        ig.appendChild(c);
      });

function openOrderDeltaModal_v4(seat, item){
  const bucket = getOrderBucket(seat);
  let delta = 0;

  openModal(
    "注文",
    `
      <div style="font-weight:1000; font-size:20px; margin-bottom:10px">${item.name}</div>
      <div class="muted" style="margin-bottom:14px">${yen(item.price)} / 税${item.tax}%</div>

      <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px">
        <button class="btn" id="odMinus" style="min-width:72px">◀︎</button>
        <div class="pill" id="odVal" style="min-width:120px">0</div>
        <button class="btn lime" id="odPlus" style="min-width:72px">▶︎</button>
      </div>

      <div class="muted">※ 追加する数を選んでください（0なら追加なし）</div>
    `,
    [
      {label:"戻る", lime:false, onClick:()=> closeModal()},
      {label:"決定", lime:true, onClick:()=>{
        if(delta===0){
          closeModal();
          return;
        }

        upsertOrderAgg(bucket, item, delta);
        pushOrderLog(bucket, item, delta, "追加");
        seat.total = calcOrdersTotal(bucket.orders || []);

        if(seat.groupId){
          const list = getGroupSeats(seat.groupId);
          list.forEach(s=>{
            s.people = seat.people;
            s.status = "in";
            s.bills = 1;
          });
        }else{
          seat.status = "in";
          seat.bills = 1;
        }

        closeModal();
        renderSeats();
        renderOrder_v4();
      }},
    ],
    getSeatDisplayLabel(seat)
  );

  setTimeout(()=>{
    const setVal = ()=> $("odVal").textContent = String(delta);

    $("odMinus").onclick = ()=>{
      if(delta<=0) return;
      delta -= 1;
      setVal();
    };
    $("odPlus").onclick = ()=>{
      delta += 1;
      setVal();
    };

    setVal();
  },0);
}

function renderOrderHistory_v4(seat){
  const bucket = getOrderBucket(seat);
  const box = $("orderHistory");
  box.innerHTML = "";

  const agg = (bucket.orders || []).slice().sort((a,b)=> (b.qty||0) - (a.qty||0));
  if(agg.length===0){
    box.innerHTML = `<div class="panel muted">まだありません</div>`;
    return;
  }

  agg.forEach(a=>{

    row.style.border = "none";

    row.style.background = "rgba(255,255,255,.45)";

    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; gap:10px; align-items:center">
        <div style="min-width:0">
          <div style="font-weight:1000; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:18px">${a.name} × ${a.qty}</div>
          <div class="muted" style="margin-top:4px; font-weight:1000; font-size:18px">${yen(Number(a.price||0) * Number(a.qty||0))}</div>
        </div>

      </div>
    `;
    box.appendChild(row);

    row.querySelector(`[data-hfix="${a.itemId}"]`).onclick = ()=>{
      openHistoryFix_v4(seat, a.itemId);

}

const ORDER_FIX_REASONS = ["未提供","数え間違い","注文取り違い","提供済み取消","その他"];

function openHistoryFix_v4(seat, itemId){
  const bucket = getOrderBucket(seat);
  const agg = (bucket.orders || []).find(x=> x.itemId===itemId);
  if(!agg) return;

  let delta = 0;

  openModal(
    "修正",
    `
      <div style="font-weight:1000; font-size:20px; margin-bottom:8px">${agg.name}</div>
      <div class="muted" style="margin-bottom:12px">現在：${agg.qty}</div>

      <div style="margin-bottom:8px; font-weight:1000">理由（必須）</div>
      <select id="ofWhy" class="btn full" style="text-align:left">
        <option value="">選択してください</option>
        ${ORDER_FIX_REASONS.map(x=> `<option value="${x}">${x}</option>`).join("")}
      </select>

      <div style="margin-top:14px; font-weight:1000; margin-bottom:8px">変更（差分）</div>
      <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:10px">
        <button class="btn" id="ofMinus" style="min-width:72px">◀︎</button>
        <div class="pill" id="ofVal" style="min-width:140px">0</div>
        <button class="btn lime" id="ofPlus" style="min-width:72px">▶︎</button>
      </div>

      <div class="muted">※ 合計が0未満にはできません</div>
    `,
    [
      {label:"戻る", lime:false, onClick:()=> closeModal()},
      {label:"決定", lime:true, onClick:()=>{
        const reason = $("ofWhy").value || "";
        if(!reason){
          toast("理由を選択してください");
          return;
        }

        const after = Number(agg.qty||0) + Number(delta||0);
        if(after < 0){
          toast("0未満にはできません");
          return;
        }

        const item = {
          id: agg.itemId,
          name: agg.name,
          price: agg.price,
          tax: agg.tax,
          cat: agg.cat,
          genre: agg.genre
        };

        upsertOrderAgg(bucket, item, delta);
        pushOrderLog(bucket, item, delta, reason);
        seat.total = calcOrdersTotal(bucket.orders || []);

        closeModal();
        renderSeats();
        renderOrder_v4();
        toast("修正しました");
      }},
    ],
    getSeatDisplayLabel(seat)
  );

  setTimeout(()=>{
    const setVal = ()=>{
      const s = delta>0 ? `+${delta}` : String(delta);
      $("ofVal").textContent = s;
    };

    $("ofMinus").onclick = ()=>{
      const cur = Number(agg.qty||0) + delta;
      if(cur <= 0) return;
      delta -= 1;
      setVal();
    };
    $("ofPlus").onclick = ()=>{
      delta += 1;
      setVal();
    };

    setVal();
  },0);
}

function openCheckout_v4(){
  showScreen("scrCheckout");

}

function calcTargetTotal(target){
  if(!target) return 0;
  if(target.groupId){
    return calcGroupTotal(target.groupId);
  }
  return Number(target.total || 0);
}

function setPayBtnHL_v4(){
  const m = state.checkout.method;
  const on = (id, flag)=> $(id)?.classList.toggle("lime", !!flag);

  on("coPayCash", m==="cash");
  on("coPayCard", m==="card");
  on("coPayQR",   m==="qr");

  $("coPaySelected").textContent =
    m==="cash" ? "現金" :
    m==="card" ? "カード" :
    m==="qr" ? "QR" : "未選択";
}

function renderCheckout_v4(){
  const target = getCheckoutTarget();
  if(!target){
    toast("会計対象が見つかりません");
    showScreen("scrMain");
    return;
  }

  const total = calcTargetTotal(target);
  $("coTotal").textContent = moneyText(total);

  const n = Math.max(1, Number(state.checkout.splitN||1));
  state.checkout.splitN = n;
  $("coSplitN").textContent = String(n);
  $("coPer").textContent = moneyText(Math.ceil(total / n));

  setPayBtnHL_v4();
  $("coSendReceipt").disabled = true;
}

function bindCheckoutOnce_v4(){
  const payCash    = $("coPayCash");
  const payCard    = $("coPayCard");
  const payQR      = $("coPayQR");
  const splitMinus = $("coSplitMinus");
  const splitPlus  = $("coSplitPlus");
  const backBtn    = $("coBack");
  const confirmBtn = $("coConfirm");
  const sendBtn    = $("coSendReceipt");

  if(!(payCash && payCard && payQR && splitMinus && splitPlus && backBtn && confirmBtn && sendBtn)){
    return;
  }

  payCash.onclick = ()=>{ state.checkout.method="cash"; setPayBtnHL_v4(); };
  payCard.onclick = ()=>{ state.checkout.method="card"; setPayBtnHL_v4(); };
  payQR.onclick   = ()=>{ state.checkout.method="qr";   setPayBtnHL_v4(); };

  splitMinus.onclick = ()=>{
    state.checkout.splitN = Math.max(1, Number(state.checkout.splitN||1) - 1);
    renderCheckout_v4();
  };
  splitPlus.onclick = ()=>{
    state.checkout.splitN = Math.max(1, Number(state.checkout.splitN||1) + 1);
    renderCheckout_v4();
  };

  backBtn.onclick = ()=> showScreen("scrOrder");
  sendBtn.onclick = ()=> toast("無料版は送信できません（有料版）");
  confirmBtn.onclick = ()=> finalizeCheckout_v4();
}

function finalizeCheckout_v4(){
  const target = getCheckoutTarget();

    showScreen("scrMain");
    return;

        return;
      }

function finalizeCheckoutCore_v4(target){
  const total  = calcTargetTotal(target);
  const method = state.checkout.method;

  if(Array.isArray(state.sales)){
    state.sales = { list: state.sales, tab:"today", dailyYmd:null };
  }
  state.sales = state.sales || { list: [], tab:"today", dailyYmd:null };
  if(!Array.isArray(state.sales.list)) state.sales.list = [];

  const tsNow = nowTs();
  const payJP =
    method==="cash" ? "現金" :
    method==="card" ? "カード" :
    method==="qr" ? "QR" : "現金";

  const ordersSrc = (target.orders || []);
  const items = ordersSrc.map(o=>({
    name: o.name,
    qty: Number(o.qty||0),
    price: Number(o.price||0),
    tax: Number(o.tax||0),
  })).filter(x=> x.name && x.qty>0);

  state.sales.list.push({
    saleId: "s" + Math.random().toString(36).slice(2),
    ts: tsNow,
    inTs: tsNow,
    outTs: tsNow,
    seatId: getSeatDisplayLabel(target),
    name: target.name || "",
    pay: payJP,
    amount: total,
    receipt: false,
    items,
    corrections: [],
  });

  if(target.groupId){
    clearGroupById(target.groupId);
  }else{
    clearSeatToEmpty(target);
  }

  state.checkout.method = null;

function getSeatStatusLabel(seat){
  if((seat.status||"empty")==="empty") return "空席";
  if((seat.status||"empty")==="reserve") return "予約";
  if(seat.merged) return "合流";
  return "来店";
}

function seatSortKey(id){
  const t = String(id||"").trim();
  const m = t.match(/^([A-Za-z]+)?\s*0*([0-9]+)?$/);
  if(m){
    const a = (m[1]||"").toUpperCase();
    const n = m[2] ? Number(m[2]) : -1;
    return `${a.padEnd(4,"~")}_${String(n).padStart(6,"0")}_${t}`;
  }
  return `~~~~_${t}`;
}

function getWholeMoveSourceSeats_v4(fromIds){

  const picked =
    fromIds
      .map(id=> seatById(id))
      .filter(Boolean);

  const byId = {};

  picked.forEach(seat=>{

    if(seat.groupId){

      getGroupSeats(seat.groupId)
        .forEach(gs=>{
          byId[gs.id] = gs;
        });

    }else{

      byId[seat.id] = seat;

    }

  });

  return Object.values(byId);

}

        return `

            <div style="display:flex; height:100%; flex-direction:column; align-items:center; justify-content:center; gap:6px; font-weight:1000;">
              <div style="font-size:26px;">${id}</div>

            </div>

      }).join("")}
    </div>
  `;
}

  let mode = "move";
  let fromIds = [];
  let toIds = [];

  function renderBody(){
    const hintText = mode==="move"

      : "※ 合流は相席用です。元席番号は会計終了まで識別用で保持します";

  openModal(
    "席移動",
    `<div id="mvWrap">${renderBody()}</div>`,
    [{label:"戻る", lime:false, onClick:()=> closeModal()}]
  );

  function wire(){
    const wrap = $("mvWrap");
    if(!wrap) return;

    const rerender = ()=>{
      wrap.innerHTML = renderBody();
      wire();
    };

    $("mvModeMove").onclick = ()=>{
      mode = "move";
      fromIds = [];
      toIds = [];
      rerender();
    };
    $("mvModeMerge").onclick = ()=>{
      mode = "merge";
      fromIds = [];
      toIds = [];
      rerender();

        const id = el.getAttribute("data-mvfrom");

        else fromIds.push(id);
        rerender();

        if(i >= 0) toIds.splice(i,1);

      }

function doSeatMove_v4(fromIds, toIds){

  const fromSeats =
    getWholeMoveSourceSeats_v4(fromIds);

  const toSeats =
    toIds
      .map(id=> seatById(id))
      .filter(Boolean);

  if(!fromSeats.length || !toSeats.length){
    toast("席が見つかりません");
    return;
  }

  const invalidTo =
    toSeats.some(s=>
      (s.status !== "empty"
       && !fromSeats.some(f=> f.id===s.id))
    );

  if(invalidTo){
    toast("移動先は空席だけにしてください");
    return;
  }


  const payloadRoot =
    fromSeats.find(s=> s.groupRoot === s.id)
    || fromSeats[0];


  const payload = {

    status: payloadRoot.status || "in",
    name: payloadRoot.name || "",
    reserve: payloadRoot.reserve
      ? JSON.parse(JSON.stringify(payloadRoot.reserve))
      : null,

    bills: 1,

    orders:
      Array.isArray(payloadRoot.orders)
        ? JSON.parse(JSON.stringify(payloadRoot.orders))
        : [],

    orderLog:
      Array.isArray(payloadRoot.orderLog)
        ? JSON.parse(JSON.stringify(payloadRoot.orderLog))
        : [],

    total: Number(payloadRoot.total || 0),

    groupId: payloadRoot.groupId || null,
    groupColor: payloadRoot.groupColor || null,

  };


  const movedPeople =
    Math.max(
      ...fromSeats.map(s=> Number(s.people||0)),
      fromSeats.length
    );


  const targetCap =
    toSeats.reduce(
      (sum, s)=> sum + Number(s.cap||1),
      0
    );


  const movedFromLabel =
    fromIds.join("");


  const doMove = ()=>{

    fromSeats.forEach(s=> clearSeatToEmpty(s));

    const rootId = toSeats[0].id;

    toSeats.forEach((s, idx)=>{

      s.status = payload.status;

      s.people = movedPeople;

      s.name =
        idx===0
          ? payload.name
          : "";

      s.bills = payload.bills;

      s.total =
        idx===0
          ? payload.total
          : 0;

      s.orders =
        idx===0
          ? JSON.parse(JSON.stringify(payload.orders))
          : [];

      s.orderLog =
        idx===0
          ? JSON.parse(JSON.stringify(payload.orderLog))
          : [];

      s.reserve =
        payload.reserve
          ? JSON.parse(JSON.stringify(payload.reserve))
          : null;

      s.groupId = payload.groupId;
      s.groupColor = payload.groupColor;
      s.groupRoot = rootId;

      s.fromSeatLabels =
        idx===0
          ? movedFromLabel
          : "";

    });

    renderSeats();

    closeModal();

    toast("移動しました");

  };


  if(targetCap < movedPeople){

    openModal(
      "確認",
      `<div>席数と人数が合ってません</div>`,
      [
        {label:"移動する", lime:true, onClick:()=> doMove()},
        {label:"戻る", lime:false, onClick:()=> closeModal()},
      ]
    );

    return;

  }

  doMove();

}

function doSeatMerge_v4(fromIds, toIds){

  const fromSeats =
    fromIds
      .map(id=> seatById(id))
      .filter(Boolean);

  const toSeats =
    toIds
      .map(id=> seatById(id))
      .filter(Boolean);

  if(!fromSeats.length || !toSeats.length){
    toast("席が見つかりません");
    return;
  }


  const base =
    fromSeats.find(s=> s.groupRoot === s.id)
    || fromSeats[0];


  const mergeIds =
    [...new Set([...fromIds, ...toIds])];


  const groupInfo =
    window.ONE_MAIN_ASSIGN_GROUP_TO_IDS
      ? window.ONE_MAIN_ASSIGN_GROUP_TO_IDS(
          mergeIds,
          Math.max(
            ...fromSeats.map(s=> Number(s.people||0)),
            fromIds.length
          ),
          "in"
        )
      : null;


  const gid =
    groupInfo?.groupId
    || ("G" + String(state.groupSeq||1));

  const color =
    groupInfo?.groupColor
    || "pink";

  const root =
    groupInfo?.groupRoot
    || mergeIds[0];


  let total = 0;
  let people = 0;

  const combinedOrders = [];
  const combinedLog = [];


  mergeIds.forEach(id=>{

    const s = seatById(id);
    if(!s) return;

    people =
      Math.max(
        people,
        Number(s.people||0)
      );

    total += Number(s.total||0);

    (s.orders||[])
      .forEach(o=>
        combinedOrders.push(
          JSON.parse(JSON.stringify(o))
        )
      );

    (s.orderLog||[])
      .forEach(l=>
        combinedLog.push(
          JSON.parse(JSON.stringify(l))
        )
      );

  });


  people =
    Math.max(
      people,
      fromIds.length
    );


  const mergeFromLabel =
    fromIds.join("");


  mergeIds.forEach(id=>{

    const s = seatById(id);
    if(!s) return;

    s.status = "in";

    s.people = people;

    s.groupId = gid;
    s.groupColor = color;
    s.groupRoot = root;

    s.name =
      id===root
        ? base.name
        : "";

    s.reserve = null;

    s.bills = 1;

    s.orders =
      id===root
        ? combinedOrders
        : [];

    s.orderLog =
      id===root
        ? combinedLog
        : [];

    s.total =
      id===root
        ? total
        : 0;

    s.fromSeatLabels =
      id===root
        ? mergeFromLabel
        : "";

  });


  renderSeats();

  closeModal();

  toast("合流しました");

}

/* ===== Helpers ===== */
function kitchenHM(ts){
  const d = new Date(ts);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function kitchenSeatText(x){
  if(x.seatLabel && String(x.seatLabel).trim()) return String(x.seatLabel).trim();
  if(x.subId && x.subId !== x.seatId) return `${x.seatId}/${x.subId}`;
  return String(x.seatId || "");
}

function kitchenPassCategory(item){
  if(item.cat === "food" && !state.kitchen.showFood) return false;
  if(item.cat === "drink" && !state.kitchen.showDrink) return false;
  return true;
}

function kitchenGroups(list){
  const map = new Map();

  list.forEach(it=>{
    const key = `${it.name}__${it.cat}`;
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(it);
  });

  const groups = Array.from(map.values());
  groups.forEach(arr => arr.sort((a,b)=> a.ts - b.ts));
  groups.sort((a,b)=> a[0].ts - b[0].ts);

  return groups;
}

function addKitchenFromOrder(seat, subId, item, delta=1){
  if(!seat || !item) return;
  if(Number(delta || 0) <= 0) return;

  const cat = String(item.cat || "food");
  const sid = String(seat.id || "");
  const sub = String(subId || sid);
  const seatLabel =
    seat.mergeLabel ? `${seat.mergeLabel} / ${sub}` :
    (sub !== sid ? `${sid}/${sub}` : sid);

  const key = `${sid}__${sub}__${String(item.id || item.name || "")}`;

  let found = state.kitchen.items.find(x=> x._key === key && x.status === "todo");
  if(!found){
    found = {
      kid: "k_" + Math.random().toString(36).slice(2),
      _key: key,
      ts: nowTs(),
      seatId: sid,
      subId: sub,
      seatLabel,
      name: String(item.name || ""),
      qty: 0,
      cat,
      status: "todo"
    };
    state.kitchen.items.push(found);
  }

  found.qty += Number(delta || 0);
  if(found.qty < 0) found.qty = 0;
}

  state.sales.tab = "today";
})();

/* ===== Helpers ===== */
function salesYmd(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function salesFmtHM(ts){
  if(!ts) return "--:--";
  const d = new Date(ts);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function salesNum(n){
  n = Number(n);
  return Number.isFinite(n) ? n : 0;
}

/* 席表示を新仕様に合わせて吸収
   優先順：
   1) seatLabel
   2) groupLabel
   3) seatIds ["A","B"] → A / B
   4) seatId
*/
function salesSeatText(s){
  if(!s) return "";

  if(s.seatLabel && String(s.seatLabel).trim()){
    return String(s.seatLabel).trim();
  }

  if(s.groupLabel && String(s.groupLabel).trim()){
    return String(s.groupLabel).trim();
  }

  if(Array.isArray(s.seatIds) && s.seatIds.length){
    return s.seatIds.map(x=> String(x)).join(" / ");
  }

  if(s.seatId && String(s.seatId).trim()){
    return String(s.seatId).trim();
  }

  return "";
}

function salesNameText(s){
  if(!s) return "";
  return String(s.name || "").trim();
}

function salesSeatLabelWithName(s){
  const seatTxt = salesSeatText(s);
  const nameTxt = salesNameText(s);

  if(seatTxt && nameTxt) return `${seatTxt}（${nameTxt}）`;
  if(seatTxt) return seatTxt;
  if(nameTxt) return `（${nameTxt}）`;
  return "-";
}

/* ===== Aggregation ===== */
function salesRowsToday(){
  const today = salesYmd(new Date());
  return (state.sales.list || []).filter(s=>{
    const d = new Date(s.ts);
    return salesYmd(d) === today;
  });
}

function salesAggToday(){
  const rows = salesRowsToday();
  const sum = rows.reduce((a,b)=> a + salesNum(b.amount), 0);

  const payCnt = {現金:0, カード:0, QR:0};

  rows.forEach(s=>{
    const p = s.pay || "現金";
    if(!(p in payCnt)) payCnt[p] = 0;
    payCnt[p] += 1;
  });

  return {
    rows,
    sum,
    cnt: rows.length,
    payCnt
  };
}

/* ===== 訂正伝票表示 ===== */
function renderCorrectionsInline_v2(s){
  const list = Array.isArray(s.corrections) ? s.corrections : [];
  if(!list.length) return "";

  return list
    .slice()
    .sort((a,b)=> (b.ts||0) - (a.ts||0))
    .map(c=>{
      const who = c.who || "";
      const why = c.why || "";
      const t = salesFmtHM(c.ts);

      const pBefore = c.payBefore || "";
      const pAfter  = c.payAfter  || "";
      const payLine = (pBefore || pAfter)
        ? `支払：${pBefore}${pAfter ? ` → ${pAfter}` : ""}`
        : "";

      const before = Array.isArray(c.itemsBefore) ? c.itemsBefore : [];
      const after  = Array.isArray(c.itemsAfter)  ? c.itemsAfter  : [];

      const map = new Map();

      before.forEach(it=>{
        const k = (it && it.name) ? String(it.name) : "";
        if(!k) return;
        if(!map.has(k)) map.set(k, {name:k, b:0, a:0});
        map.get(k).b += salesNum(it.qty);
      });

      after.forEach(it=>{
        const k = (it && it.name) ? String(it.name) : "";
        if(!k) return;
        if(!map.has(k)) map.set(k, {name:k, b:0, a:0});
        map.get(k).a += salesNum(it.qty);
      });

      const diffs = Array.from(map.values()).sort((x,y)=> x.name.localeCompare(y.name, "ja"));

      const diffRows = diffs.map(x=>`
        <div style="display:flex; justify-content:space-between; gap:10px; margin:4px 0">
          <div style="min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${x.name}</div>
          <div style="display:flex; gap:8px; font-weight:900">
            <span>${x.b}</span>
            <span style="opacity:.6">→</span>
            <span>${x.a}</span>
          </div>
        </div>
      `).join("");

      return `
        <div style="
          margin:8px 0 10px;
          padding:10px;
          border-radius:14px;
          background:rgba(255,255,255,0.42);
          border:2px solid rgba(0,0,0,0.05);
          opacity:.95;
        ">
          <div style="font-weight:900; margin-bottom:4px">訂正：${t}${who ? ` ／ ${who}` : ""}${why ? ` ／ ${why}` : ""}</div>
          ${payLine ? `<div style="margin-bottom:4px">${payLine}</div>` : ""}
          <div>${diffRows || "（数量変更なし）"}</div>
        </div>
      `;
    })
    .join("");
}

/* ===== State ===== */
state.fix = state.fix || {
  targetId: null,
  draft: null,
  stage: "edit"   // edit | confirm
};

/* ===== Helpers ===== */
function fixSafeNum(n){
  n = Number(n);
  return Number.isFinite(n) ? n : 0;
}

function fixCloneItems(items){
  return (items || []).map(it=> ({
    name: String(it?.name || ""),
    qty: Math.max(0, fixSafeNum(it?.qty)),
    price: fixSafeNum(it?.price),
    tax: fixSafeNum(it?.tax)
  }));
}

function fixItemsToNameQty(items){
  return (items || []).map(it=> ({
    name: String(it?.name || ""),
    qty: Math.max(0, fixSafeNum(it?.qty))
  }));
}

function fixCalcAmount(items){
  return (items || []).reduce((sum, it)=>{
    return sum + fixSafeNum(it.price) * fixSafeNum(it.qty);
  }, 0);
}

function getSaleById(id){
  if(!state.sales || !Array.isArray(state.sales.list)) return null;
  return state.sales.list.find(s => s.saleId === id) || null;
}

function fixFmtHM(ts){
  if(!ts) return "--:--";
  const d = new Date(ts);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function fixSeatText(s){
  if(!s) return "";

  if(s.seatLabel && String(s.seatLabel).trim()){
    return String(s.seatLabel).trim();
  }

  if(s.groupLabel && String(s.groupLabel).trim()){
    return String(s.groupLabel).trim();
  }

  if(Array.isArray(s.seatIds) && s.seatIds.length){
    return s.seatIds.map(x=> String(x)).join(" / ");
  }

  if(s.seatId && String(s.seatId).trim()){
    return String(s.seatId).trim();
  }

  return "";
}

function fixSeatLabelWithName(s){
  const seatTxt = fixSeatText(s);
  const nameTxt = String(s?.name || "").trim();

  if(seatTxt && nameTxt) return `${seatTxt}（${nameTxt}）`;
  if(seatTxt) return seatTxt;
  if(nameTxt) return `（${nameTxt}）`;
  return "-";
}

function fixPayOptionsHtml(sel){
  const opts = ["現金","カード","QR"];
  return opts.map(p=> `<option value="${p}" ${p===sel ? "selected" : ""}>${p}</option>`).join("");
}

function fixDiffNameQty(before, after){
  const map = new Map();

  (before || []).forEach(it=>{
    const k = String(it?.name || "");
    if(!k) return;
    if(!map.has(k)) map.set(k, {name:k, b:0, a:0});
    map.get(k).b += fixSafeNum(it?.qty);
  });

  (after || []).forEach(it=>{
    const k = String(it?.name || "");
    if(!k) return;
    if(!map.has(k)) map.set(k, {name:k, b:0, a:0});
    map.get(k).a += fixSafeNum(it?.qty);
  });

  return Array.from(map.values()).sort((x,y)=> x.name.localeCompare(y.name, "ja"));
}

function openFixForSaleId_v2(saleId){

  if(!s){

    who: "",
    why: "",
    pay: basePay,
    items: fixCloneItems(baseItems),
    baseItems: fixCloneItems(baseItems),
    basePay: basePay
  };

  showScreen("scrFix");
  renderFix_v2();
}

function ssNormalizeWideDigitChar(ch){
  const code = ch.charCodeAt(0);
  if(code >= 0xFF10 && code <= 0xFF19){
    return String(code - 0xFF10);
  }
  return ch;
}

function ssToHalfDigits(str){
  return String(str || "").replace(/[０-９]/g, ch => ssNormalizeWideDigitChar(ch));
}

function ssToWideDigitString(numStr){
  return String(numStr).replace(/[0-9]/g, d =>
    String.fromCharCode("０".charCodeAt(0) + Number(d))
  );
}

function ssDigitStyleOf(str){
  return /[０-９]/.test(str) ? "wide" : "half";
}

/* =========================
  予測ロジック
========================= */

const SS_HIRA_V9 = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん";
const SS_LOWER_V9 = "abcdefghijklmnopqrstuvwxyz";
const SS_UPPER_V9 = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

function ssHasSpaceOrSymbol_v9(s){
  return /[^0-9０-９A-Za-zぁ-んァ-ンー]/.test(s);
}

function ssNextFromSet_v9(ch, setStr){
  const i = setStr.indexOf(ch);
  if(i === -1) return null;
  return setStr[i+1] || null;
}

function ssParsePredictPattern_v9(s){
  const t = String(s || "").trim();
  if(!t) return null;
  if(ssHasSpaceOrSymbol_v9(t)) return null;

  const half = ssToHalfDigits(t);

  if(t.length === 1){
    const ch = t;
    const h = half;

    if(SS_HIRA_V9.includes(ch)) return { mode:"single_hira", first:ch };
    if(SS_LOWER_V9.includes(ch)) return { mode:"single_lower", first:ch };
    if(SS_UPPER_V9.includes(ch)) return { mode:"single_upper", first:ch };
    if(/^[1-9]$/.test(h)) return { mode:"single_digit", first:h, digitStyle:ssDigitStyleOf(t) };

    // 未定義1文字は予測しない
    return null;
  }

  if(/^[ぁ-ん][0-9]+$/.test(half)){
    return {
      mode:"prefix_hira_digit",
      prefix:t.slice(0,1),
      tailHalf:half.slice(1),
      digitStyle:ssDigitStyleOf(t)
    };
  }

  if(/^[a-z][0-9]+$/.test(half)){
    return {
      mode:"prefix_lower_digit",
      prefix:t.slice(0,1),
      tailHalf:half.slice(1),
      digitStyle:ssDigitStyleOf(t)
    };
  }

  if(/^[A-Z][0-9]+$/.test(half)){
    return {
      mode:"prefix_upper_digit",
      prefix:t.slice(0,1),
      tailHalf:half.slice(1),
      digitStyle:ssDigitStyleOf(t)
    };
  }

  if(/^[0-9]+[ぁ-ん]$/.test(half)){
    return {
      mode:"digit_hira",
      prefix:half.slice(0,-1),
      tail:t.slice(-1),
      digitStyle:ssDigitStyleOf(t.slice(0,-1))
    };
  }

  if(/^[0-9]+[a-z]$/.test(half)){
    return {
      mode:"digit_lower",
      prefix:half.slice(0,-1),
      tail:t.slice(-1),
      digitStyle:ssDigitStyleOf(t.slice(0,-1))
    };
  }

  if(/^[0-9]+[A-Z]$/.test(half)){
    return {
      mode:"digit_upper",
      prefix:half.slice(0,-1),
      tail:t.slice(-1),
      digitStyle:ssDigitStyleOf(t.slice(0,-1))
    };
  }

  if(/^[0-9]+$/.test(half)){
    return {
      mode:"digits_only",
      firstNum:Number(half),
      digitStyle:ssDigitStyleOf(t)
    };
  }

  // 未定義 + 数字末尾 → その数字だけ連番
  const mNum = t.match(/^(.*?)([0-9０-９]+)$/);
  if(mNum){
    return {
      mode:"suffix_digits_generic",
      prefix:mNum[1],
      tailHalf:ssToHalfDigits(mNum[2]),
      digitStyle:ssDigitStyleOf(mNum[2])
    };
  }

  // 未定義 + 英字1文字だけ → その英字だけ連番
  const mLower1 = t.match(/^(.*?)([a-z])$/);
  if(mLower1){
    const prefix = mLower1[1];
    if(!/[a-z]{2,}$/.test(t)){
      return { mode:"suffix_lower_generic", prefix, tail:mLower1[2] };
    }
  }

  const mUpper1 = t.match(/^(.*?)([A-Z])$/);
  if(mUpper1){
    const prefix = mUpper1[1];
    if(!/[A-Z]{2,}$/.test(t)){
      return { mode:"suffix_upper_generic", prefix, tail:mUpper1[2] };
    }
  }

  // 未定義 + ひらがな1文字
  const mHira1 = t.match(/^(.*?)([ぁ-ん])$/);
  if(mHira1){
    const prefix = mHira1[1];
    if(!/[ぁ-ん]{2,}$/.test(t)){
      return { mode:"suffix_hira_generic", prefix, tail:mHira1[2] };
    }
  }

  // それ以外は予測しない
  return null;
}

function ssFormatNumWithStyle_v9(n, style){
  const s = String(n);
  return style === "wide" ? ssToWideDigitString(s) : s;
}

function ssBuildIds_v9(start, count, predictOn){
  const s = String(start || "").trim();
  const c = Math.max(0, ssNum(count));
  const out = [];

  if(!s || c <= 0) return out;

  if(!predictOn){
    for(let i=0;i<c;i++) out.push(s);
    return out;
  }

  const p = ssParsePredictPattern_v9(s);
  if(!p){
    for(let i=0;i<c;i++) out.push(s);
    return out;
  }

  if(p.mode === "single_hira"){
    let cur = p.first;
    for(let i=0;i<c;i++){
      out.push(cur);
      const nx = ssNextFromSet_v9(cur, SS_HIRA_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "single_lower"){
    let cur = p.first;
    for(let i=0;i<c;i++){
      out.push(cur);
      const nx = ssNextFromSet_v9(cur, SS_LOWER_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "single_upper"){
    let cur = p.first;
    for(let i=0;i<c;i++){
      out.push(cur);
      const nx = ssNextFromSet_v9(cur, SS_UPPER_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "single_digit"){
    let n = Number(p.first);
    for(let i=0;i<c;i++){
      out.push(ssFormatNumWithStyle_v9(n, p.digitStyle));
      n += 1;
    }
    return out;
  }

  if(
    p.mode === "prefix_hira_digit" ||
    p.mode === "prefix_lower_digit" ||
    p.mode === "prefix_upper_digit"
  ){
    let n = Number(p.tailHalf);
    for(let i=0;i<c;i++){
      out.push(`${p.prefix}${ssFormatNumWithStyle_v9(n, p.digitStyle)}`);
      n += 1;
    }
    return out;
  }

  if(p.mode === "digit_hira"){
    let cur = p.tail;
    for(let i=0;i<c;i++){
      out.push(`${ssFormatNumWithStyle_v9(p.prefix, p.digitStyle)}${cur}`);
      const nx = ssNextFromSet_v9(cur, SS_HIRA_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "digit_lower"){
    let cur = p.tail;
    for(let i=0;i<c;i++){
      out.push(`${ssFormatNumWithStyle_v9(p.prefix, p.digitStyle)}${cur}`);
      const nx = ssNextFromSet_v9(cur, SS_LOWER_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "digit_upper"){
    let cur = p.tail;
    for(let i=0;i<c;i++){
      out.push(`${ssFormatNumWithStyle_v9(p.prefix, p.digitStyle)}${cur}`);
      const nx = ssNextFromSet_v9(cur, SS_UPPER_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "digits_only"){
    let n = Number(p.firstNum);
    for(let i=0;i<c;i++){
      out.push(ssFormatNumWithStyle_v9(n, p.digitStyle));
      n += 1;
    }
    return out;
  }

  if(p.mode === "suffix_digits_generic"){
    let n = Number(p.tailHalf);
    for(let i=0;i<c;i++){
      out.push(`${p.prefix}${ssFormatNumWithStyle_v9(n, p.digitStyle)}`);
      n += 1;
    }
    return out;
  }

  if(p.mode === "suffix_lower_generic"){
    let cur = p.tail;
    for(let i=0;i<c;i++){
      out.push(`${p.prefix}${cur}`);
      const nx = ssNextFromSet_v9(cur, SS_LOWER_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "suffix_upper_generic"){
    let cur = p.tail;
    for(let i=0;i<c;i++){
      out.push(`${p.prefix}${cur}`);
      const nx = ssNextFromSet_v9(cur, SS_UPPER_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  if(p.mode === "suffix_hira_generic"){
    let cur = p.tail;
    for(let i=0;i<c;i++){
      out.push(`${p.prefix}${cur}`);
      const nx = ssNextFromSet_v9(cur, SS_HIRA_V9);
      if(!nx && i < c-1){
        for(let k=i+1;k<c;k++) out.push(s);
        break;
      }
      cur = nx;
    }
    return out.slice(0,c);
  }

  for(let i=0;i<c;i++) out.push(s);
  return out;
}

function ssHasDuplicateInsideSameName_v9(name, ids){

  const normalized = ids.map(x => String(x || "").trim()).filter(Boolean);
  const dupInPreview = new Set();

  normalized.forEach(id=>{
    if(dupInPreview.has(id)) return;
    const n = normalized.filter(x => x === id).length;
    if(n >= 2) dupInPreview.add(id);
  });

  if(dupInPreview.size > 0) return true;

  const sameNameGroups = (state.seatSetup.groups || []).filter(g => g.name === name);
  const existingIds = sameNameGroups.flatMap(g => Array.isArray(g.seatIds) ? g.seatIds : []);

  return normalized.some(id => existingIds.includes(id));
}

function ssFindSeatCapFromGroup_v9(g, seatId){
  const caps = Array.isArray(g?.capacities) ? g.capacities : [];
  const hit = caps.find(x => x && x.id === seatId);
  if(hit) return Math.max(0, ssNum(hit.cap));
  return Math.max(0, ssNum(g?.capacity || 0));
}

/* =========================
  PART7：同期・端末管理・バックアップ（完成版）1/2
  重要：
   - 📶は残す
   - メイン画面の「同期状態：〜」文字は出さない
   - 勝手に同期しない
   - 操作ごとに未同期があれば1回だけ試す
   - 未同期がある時だけ10分おき再試行
   - 保存＝確定保存＋未同期があれば再送
   - FREE端末3台制限（同期不可、ローカル操作は可能）
========================= */

/* ===== Device ID ===== */
function getDeviceId(){
  const k = KEY + "_DEVICE_ID";
  let id = localStorage.getItem(k);
  if(!id){
    id = "dev_" + Math.random().toString(36).slice(2);
    localStorage.setItem(k, id);
  }
  return id;
}

/* ===== Sync state ===== */
state.sync = state.sync || {
  deviceId: getDeviceId(),
  devices: [],
  pending: [],
  lastTryTs: 0,
  maxDevicesFree: 3,
  canSync: true
};

/* ===== Local store helpers ===== */
function loadStore(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){
    console.warn("loadStore error", e);
    return null;
  }
}

function saveStore(obj){
  try{
    localStorage.setItem(KEY, JSON.stringify(obj));
    return true;
  }catch(e){
    console.warn("saveStore error", e);
    toast("保存に失敗しました");
    return false;
  }
}

function buildStoreSnapshot(){
  return {
    devices: Array.isArray(state.sync?.devices) ? state.sync.devices.slice() : [],
    pending: Array.isArray(state.sync?.pending) ? state.sync.pending.slice() : [],
    seats: state.seats || [],
    seatSetup: state.seatSetup || null,
    kitchen: state.kitchen || null,
    sales: state.sales || null,
    menu: state.menu || null,
    updatedTs: nowTs()
  };
}

/* ===== Device register / limit ===== */
function ensureDeviceRegistered(){
  const st = loadStore() || {};
  st.devices = Array.isArray(st.devices) ? st.devices : [];

  const id = state.sync.deviceId || getDeviceId();
  state.sync.deviceId = id;

  if(!st.devices.includes(id)){
    st.devices.push(id);
  }

  state.sync.devices = st.devices.slice();
  state.sync.canSync = (state.sync.devices.length <= Number(state.sync.maxDevicesFree || 3));

  st.devices = state.sync.devices.slice();
  saveStore(st);

  return state.sync.canSync;
}

function refreshSyncCapability(){
  ensureDeviceRegistered();
  state.sync.canSync = (state.sync.devices.length <= Number(state.sync.maxDevicesFree || 3));
  return state.sync.canSync;
}

/* ===== Persist ===== */
function persistAll(){
  refreshSyncCapability();
  const snapshot = buildStoreSnapshot();
  saveStore(snapshot);
}

function restoreAll(){
  const st = loadStore();
  if(!st) return;

  if(Array.isArray(st.seats)) state.seats = st.seats;
  if(st.seatSetup) state.seatSetup = st.seatSetup;
  if(st.kitchen) state.kitchen = st.kitchen;
  if(st.sales) state.sales = st.sales;
  if(st.menu) state.menu = st.menu;

  state.sync.devices = Array.isArray(st.devices) ? st.devices.slice() : [];
  state.sync.pending = Array.isArray(st.pending) ? st.pending.slice() : [];

  refreshSyncCapability();
  setSync(state.sync.pending.length === 0 && state.sync.canSync);
}

/* ===== Network / sync checks ===== */
function hasNetwork(){
  if(typeof navigator === "undefined") return true;
  return navigator.onLine !== false;
}

function canActuallySync(){
  if(!refreshSyncCapability()) return false;
  if(!hasNetwork()) return false;
  return true;
}

/* ===== Event queue ===== */
function emitEvent(type, payload){
  state.sync.pending = Array.isArray(state.sync.pending) ? state.sync.pending : [];

  state.sync.pending.push({
    id: "ev_" + Math.random().toString(36).slice(2),
    type: String(type || ""),
    ts: nowTs(),
    deviceId: state.sync.deviceId,
    payload: payload || {}
  });

  setSync(false);
  persistAll();
  trySyncOnceSilent();
}

/* ===== Sync trial ===== */
function trySyncOnceSilent(){
  state.sync.pending = Array.isArray(state.sync.pending) ? state.sync.pending : [];

  if(state.sync.pending.length === 0){
    setSync(true);
    return;
  }

  const now = nowTs();
  if(now - Number(state.sync.lastTryTs || 0) < 10000){
    return; // 10秒以内の連打防止
  }
  state.sync.lastTryTs = now;

  if(!canActuallySync()){
    setSync(false);
    persistAll();
    return;
  }

  // 本番はここでサーバー送信
  // 今は成功扱い
  state.sync.pending = [];
  setSync(true);
  persistAll();
}

function manualSync(){
  state.sync.pending = Array.isArray(state.sync.pending) ? state.sync.pending : [];

  if(!refreshSyncCapability()){
    openModal(
      "同期",
      "無料版では同期できる端末は3台までです<br>有料版では利用可能な端末数が増えます",
      [
        {label:"戻る", lime:false, onClick:()=> closeModal()}
      ]
    );
    setSync(false);
    return;
  }

  if(state.sync.pending.length === 0){
    setSync(true);
    toast("同期されています");
    return;
  }

  if(!hasNetwork()){
    setSync(false);
    persistAll();
    toast("同期できませんでした");
    return;
  }

  state.sync.pending = [];
  setSync(true);
  persistAll();
  toast("同期しました");
}

/* ===== Auto retry: pendingがある時だけ10分おき ===== */
(function startSyncRetryTimer(){
  if(startSyncRetryTimer._started) return;
  startSyncRetryTimer._started = true;

  setInterval(()=>{
    state.sync.pending = Array.isArray(state.sync.pending) ? state.sync.pending : [];
    if(state.sync.pending.length === 0) return;
    trySyncOnceSilent();
  }, 10 * 60 * 1000);
})();

/* ===== Save ===== */
function performSave(){
  refreshSyncCapability();
  persistAll();

  if(state.sync.pending.length > 0){
    manualSync();
    return;
  }

  setSync(state.sync.canSync);
  toast("保存しました");
}

          body = "本日の売上データを送信します。";
        }else if(kind==="month"){
          subject = "ONE 今月の売上";
          body = "今月の売上データを送信します。";
        }else if(kind==="backup"){
          subject = "ONE バックアップ用データ";
          body = "バックアップ用データを送信します。";
        }

        const url = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        closeModal();
        location.href = url;
      }},
      {label:"戻る", lime:false, onClick:()=> closeModal()},
    ]
  );
}

/* =========================================================
   H) メニュー登録 ロジック
========================================================= */
function renderGenres(){
  const grid = $("genreGrid");
  if(!grid) return;
  grid.innerHTML = "";

  const list = state.menu.genres[state.menu.cat] || [];
  const final = list.concat(["＋ ジャンル追加"]);

  final.forEach(g=>{
    const c = document.createElement("div");
    c.className = "seatCard in";
    c.style.minHeight = "56px";
    c.style.display = "flex";
    c.style.alignItems = "center";
    c.style.justifyContent = "center";
    c.style.fontWeight = "900";
    c.textContent = g;

    const isAdd = (g === "＋ ジャンル追加");
    const on = (!isAdd && state.menu.selectedGenre === g);
    if(on) setCardHL(c, true);

    c.onclick = ()=>{
      if(isAdd){
        openModal(
          "ジャンル追加",
          `<input id="newGenre" class="btn full" style="text-align:left" placeholder="ジャンル名" />`,
          [
            {label:"追加", lime:true, onClick:()=>{
              const v = ($("newGenre").value||"").trim();
              if(!v){
                toast("ジャンル名を入力してください");
                return;
              }
              const arr = state.menu.genres[state.menu.cat];
              if(arr.includes(v)){
                toast("同じジャンルがあります");
                return;
              }

              arr.push(v);
              state.menu.selectedGenre = v;
              closeModal();
              renderGenres();
            }},
            {label:"戻る", lime:false, onClick:()=> closeModal()},
          ]
        );
        return;
      }

      state.menu.selectedGenre = (state.menu.selectedGenre === g) ? null : g;
      renderGenres();
    };

    grid.appendChild(c);
  });
}

function renderItems(){
  const box = $("itemList");
  if(!box) return;
  box.innerHTML = "";

  const list = state.menu.items.filter(it=> it.cat===state.menu.cat && it.genre===state.menu.selectedGenre);

  if(list.length===0){
    box.innerHTML = `<div class="muted">まだありません</div>`;
    return;
  }

  list.forEach(it=>{
    const row = document.createElement("div");
    row.className = "kRow";
    row.innerHTML = `
      <div class="kLeft">
        <div class="kName">${it.name}</div>
      </div>
      <div class="kSlide" style="gap:10px">
        <div style="font-weight:900">${yen(it.price)}</div>
        <div style="font-weight:900; opacity:.85">${it.tax}%</div>
        <button class="btn" data-edit="${it.id}">編集</button>
      </div>
    `;
    box.appendChild(row);
  });

  box.querySelectorAll("[data-edit]").forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.getAttribute("data-edit");
      const it = state.menu.items.find(x=> x.id===id);
      if(!it) return;

      openModal(
        "編集",
        `
          <div style="font-weight:900; margin-bottom:8px">ジャンル</div>
          <div class="muted" style="margin-bottom:10px">${it.genre}</div>

          <div style="margin-bottom:6px">商品名</div>
          <input id="eName" class="btn full" style="text-align:left" value="${it.name}" />

          <div style="margin-top:10px; margin-bottom:6px">金額</div>
          <input id="ePrice" class="btn full" style="text-align:left" inputmode="numeric" value="${it.price}" />

          <div style="margin-top:10px; margin-bottom:6px">税率</div>
          <div style="display:flex; gap:10px">
            <button class="btn full" id="e8" style="flex:1">8%</button>
            <button class="btn full" id="e10" style="flex:1">10%</button>
          </div>
        `,
        [
          {label:"保存", lime:true, onClick:()=>{
            const nm = ($("eName").value||"").trim();
            const pr = Number(($("ePrice").value||"").trim());

            if(!nm || !Number.isFinite(pr) || pr<=0 || !(it.tax===8 || it.tax===10)){
              toast("未記入があります");
              return;
            }

            it.name = nm;
            it.price = pr;

            if(typeof persistAll==="function") persistAll();
            closeModal();
            renderItems();
            toast("更新しました");
          }},
          {label:"戻る", lime:false, onClick:()=> closeModal()},
        ]
      );

      setTimeout(()=>{
        const setTax = (v)=>{
          it.tax = v;
          $("e8").classList.toggle("lime", v===8);
          $("e10").classList.toggle("lime", v===10);
        };
        $("e8").onclick = ()=> setTax(8);
        $("e10").onclick = ()=> setTax(10);
        setTax(it.tax || 10);
      },0);
    };
  });
}

(function hookMenu_v2(){
  const food = $("catFood");
  const drink = $("catDrink");
  if(!food || !drink) return;

  function pickCat(cat){
    state.menu.cat = cat;
    setCardHL(food, cat==="food");
    setCardHL(drink, cat==="drink");
  }

  food.onclick = ()=> pickCat("food");
  drink.onclick = ()=> pickCat("drink");

  $("catCommit").onclick = ()=>{
    if(!state.menu.cat){
      toast("カテゴリーを選択してください");
      return;
    }
    $("genreArea").style.display = "block";
    state.menu.selectedGenre = null;
    renderGenres();
    if(typeof persistAll==="function") persistAll();
  };

  $("genreDelete").onclick = ()=>{
    const g = state.menu.selectedGenre;
    if(!g){
      toast("ジャンルを選択してください");
      return;
    }

    openModal(
      "削除確認",
      "ジャンル内の商品も削除されます",
      [
        {label:"戻る", lime:false, onClick:()=> closeModal()},
        {label:"削除へ", lime:true, onClick:()=>{
          closeModal();
          openModal(
            "削除",
            `
              <div style="color:var(--danger); font-weight:900; margin-bottom:10px">
                ジャンル「${g}」と商品を削除します
              </div>
              <input id="gDelSlide" class="range" type="range" min="0" max="100" value="0" />
            `,
            [
              {label:"戻る", lime:false, onClick:()=> closeModal()}
            ]
          );

          setTimeout(()=>{
            $("gDelSlide").onchange = ()=>{
              if(Number($("gDelSlide").value||0) < 88){
                $("gDelSlide").value = 0;
                return;
              }

              state.menu.items = state.menu.items.filter(it=> !(it.cat===state.menu.cat && it.genre===g));
              state.menu.genres[state.menu.cat] = state.menu.genres[state.menu.cat].filter(x=> x!==g);
              state.menu.selectedGenre = null;

              $("itemArea").style.display = "none";
              closeModal();
              renderGenres();
              if(typeof persistAll==="function") persistAll();
              toast("削除しました");
            };
          },0);
        }},
      ]
    );
  };

  $("genreDecide").onclick = ()=>{
    const g = state.menu.selectedGenre;
    if(!g){
      toast("ジャンルを選択してください");
      return;
    }

    $("itemArea").style.display = "block";

    const setTax = (v)=>{
      state.menu.tax = v;
      $("tax8").classList.toggle("lime", v===8);
      $("tax10").classList.toggle("lime", v===10);
    };

    $("tax8").onclick = ()=> setTax(8);
    $("tax10").onclick = ()=> setTax(10);
    setTax(10);

    renderItems();
    if(typeof persistAll==="function") persistAll();
  };

  $("itemAdd").onclick = ()=>{
    const g = state.menu.selectedGenre;
    const nm = ($("itemName").value||"").trim();
    const pr = Number(($("itemPrice").value||"").trim());
    const tx = state.menu.tax;

    if(!g || !nm || !Number.isFinite(pr) || pr<=0 || !(tx===8 || tx===10)){
      toast("未記入があります");
      return;
    }

    state.menu.items.push({
      id: "m_" + Math.random().toString(36).slice(2),
      cat: state.menu.cat,
      genre: g,
      name: nm,
      price: pr,
      tax: tx
    });

    $("itemName").value = "";
    $("itemPrice").value = "";

    renderItems();
    if(typeof persistAll==="function") persistAll();
    toast("登録しました");
  };
})();
